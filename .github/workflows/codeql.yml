name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '36 17 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
      - name: Checkout repository
        # actions/checkout v4.3.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        # TODO: SHA-pin this action (could not resolve offline). Pin github/codeql-action to a full release SHA.
        uses: github/codeql-action/init@v4.36.3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        # TODO: SHA-pin this action (could not resolve offline). Pin github/codeql-action to a full release SHA.
        uses: github/codeql-action/autobuild@v4.36.3

      - name: Perform CodeQL Analysis
        # TODO: SHA-pin this action (could not resolve offline). Pin github/codeql-action to a full release SHA.
        uses: github/codeql-action/analyze@v4.36.3
