name: mobile-eas

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - ".github/workflows/mobile.yml"
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - ".github/workflows/mobile.yml"

jobs:
  build:
    if: ${{ vars.MOBILE_CI_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Set up Expo
        if: ${{ env.EAS_TOKEN != '' }}
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ env.EAS_TOKEN }}
      - name: Build (EAS)
        if: ${{ env.EAS_TOKEN != '' }}
        run: npx eas build --platform all --non-interactive
        working-directory: apps/mobile
      - name: Skip EAS build (missing token)
        if: ${{ env.EAS_TOKEN == '' }}
        run: echo "EAS_TOKEN not set; skipping build."
