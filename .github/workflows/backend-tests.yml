name: Backend Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main', 'master', 'develop']

jobs:
  test:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    continue-on-error: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ucc_intelligence_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ucc_intelligence_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ucc_intelligence_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Install BullMQ and ioredis
        run: npm install bullmq ioredis --ignore-scripts

      - name: Run database migrations
        run: npm run migrate || echo "::warning::Migration step failed"

      - name: Run server tests
        run: npm run test:server || echo "::warning::Server tests failed"

      - name: Generate coverage report
        run: npm run test:server:coverage || echo "::warning::Coverage generation failed"

      - name: Upload coverage to Codecov
        # TODO: SHA-pin this action (could not resolve offline). Pin codecov/codecov-action to a full release SHA.
        uses: codecov/codecov-action@v7.0.0
        with:
          files: ./coverage/lcov.info
          flags: backend
          name: backend-coverage
        continue-on-error: true

      - name: Check coverage thresholds
        run: |
          echo "Checking coverage thresholds (80% lines, functions, statements; 75% branches)"
          npm run test:server:coverage -- --reporter=json || echo "::warning::Coverage thresholds not met"

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        # TODO: SHA-pin this action (could not resolve offline). Pin romeovs/lcov-reporter-action to a full release SHA.
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
