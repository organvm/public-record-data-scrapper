name: Cloud Agent Delegation

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Type of task to delegate'
        required: true
        default: 'analysis'
        type: choice
        options:
        - analysis
        - visualization
        - atomization
        - documentation
      target_file:
        description: 'Target file for processing'
        required: true
        default: 'Tomb of the Unknowns.md'
      priority:
        description: 'Task priority level'
        required: true
        default: 'medium'
        type: choice
        options:
        - low
        - medium
        - high
        - critical

jobs:
  delegate-to-cloud:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      # TODO: SHA-pin this action (could not resolve offline). actions/checkout v4.3.0 -> 08eba0b27e820071cde6df949e0beb9ba4906955
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup Node.js
      # actions/setup-node v4.4.0
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: '20'

    - name: Install dependencies
      # --ignore-scripts prevents malicious dependency lifecycle scripts from running in CI
      run: npm ci --ignore-scripts

    - name: Validate target file input
      env:
        # Never interpolate ${{ }} into the shell; pass via env and reference the quoted var.
        TARGET_FILE: ${{ github.event.inputs.target_file }}
      run: |
        # Reject path traversal, absolute paths, and shell metacharacters.
        # Allow only a conservative set of filename characters within the repo.
        case "$TARGET_FILE" in
          /*|*..*)
            echo "::error::Invalid target_file (absolute path or traversal not allowed): $TARGET_FILE"
            exit 1
            ;;
        esac
        if printf '%s' "$TARGET_FILE" | grep -qP '[^A-Za-z0-9 ._/-]'; then
          echo "::error::target_file contains disallowed characters"
          exit 1
        fi

    - name: Prepare delegation payload
      env:
        TASK_TYPE: ${{ github.event.inputs.task_type }}
        TARGET_FILE: ${{ github.event.inputs.target_file }}
        PRIORITY: ${{ github.event.inputs.priority }}
      run: |
        {
          echo "Task Type: $TASK_TYPE"
          echo "Target File: $TARGET_FILE"
          echo "Priority: $PRIORITY"
          echo "Timestamp: $(date -u)"
        } >> delegation-summary.md

    - name: Process target file
      env:
        TASK_TYPE: ${{ github.event.inputs.task_type }}
        TARGET_FILE: ${{ github.event.inputs.target_file }}
        PRIORITY: ${{ github.event.inputs.priority }}
      run: |
        if [ -f "$TARGET_FILE" ]; then
          echo "Processing file: $TARGET_FILE"
          # All untrusted inputs are read from process.env inside node, never
          # interpolated into the JS source string.
          node -e '
            const fs = require("fs");
            const target = process.env.TARGET_FILE;
            const content = fs.readFileSync(target, "utf8");
            const analysis = {
              wordCount: content.split(/\s+/).length,
              lineCount: content.split("\n").length,
              taskType: process.env.TASK_TYPE,
              priority: process.env.PRIORITY,
              timestamp: new Date().toISOString()
            };
            fs.writeFileSync("cloud-analysis.json", JSON.stringify(analysis, null, 2));
            console.log("Analysis complete:", analysis);
          '
        fi

    - name: Upload results
      # actions/upload-artifact v4.6.2
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: cloud-delegation-results-${{ github.run_number }}
        path: |
          delegation-summary.md
          cloud-analysis.json

    - name: Create delegation issue
      # TODO: SHA-pin this action (could not resolve offline). actions/github-script v7.0.1
      uses: actions/github-script@v9
      env:
        # Pass untrusted inputs via env; read with process.env inside the script.
        TASK_TYPE: ${{ github.event.inputs.task_type }}
        TARGET_FILE: ${{ github.event.inputs.target_file }}
        PRIORITY: ${{ github.event.inputs.priority }}
      with:
        script: |
          const taskType = process.env.TASK_TYPE;
          const targetFile = process.env.TARGET_FILE;
          const priority = process.env.PRIORITY;
          const runNumber = context.runNumber;
          const { data: issue } = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Cloud Agent Task: ${taskType} - ${targetFile}`,
            body: [
              '## Cloud Agent Delegation Request',
              '',
              `**Task Type:** ${taskType}`,
              `**Target File:** ${targetFile}`,
              `**Priority:** ${priority}`,
              `**Workflow Run:** ${runNumber}`,
              '',
              '### Next Steps',
              '- [ ] Review target file content',
              `- [ ] Execute ${taskType} processing`,
              '- [ ] Generate visual representations (if applicable)',
              '- [ ] Implement interactive features',
              '- [ ] Update documentation',
              '',
              '### Artifacts',
              'Check the workflow artifacts for detailed analysis results.',
              '',
              '**Automated by:** GitHub Actions Cloud Delegation Workflow'
            ].join('\n'),
            labels: ['cloud-agent', 'delegation', `${priority}-priority`]
          });

          core.info(`Created delegation issue #${issue.number}`);