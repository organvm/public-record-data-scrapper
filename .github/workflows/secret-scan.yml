name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Secret Pattern Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for secret patterns
        run: |
          FOUND=0
          # Patterns cover: OpenAI, GitHub PAT, AWS access key, Anthropic,
          # Stripe live/test secret keys, Twilio API key (SK...) and Account SID (AC...),
          # SendGrid API key (SG.), Plaid keys, JWT secrets, and DATABASE_URL with an
          # embedded password.
          patterns=(
            'sk-[a-zA-Z0-9]{20,}'
            'ghp_[a-zA-Z0-9]{36}'
            'AKIA[A-Z0-9]{16}'
            'sk-ant-[a-zA-Z0-9]{20,}'
            'sk_live_[0-9a-zA-Z]{20,}'
            'sk_test_[0-9a-zA-Z]{20,}'
            'rk_live_[0-9a-zA-Z]{20,}'
            'SK[0-9a-fA-F]{32}'
            'AC[0-9a-fA-F]{32}'
            'SG\.[A-Za-z0-9_-]{16,}\.[A-Za-z0-9_-]{16,}'
            'access-(sandbox|development|production)-[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
            '(JWT_SECRET|JWT_PRIVATE_KEY|JWT_REFRESH_SECRET)\s*[:=]\s*["'"'"']?[A-Za-z0-9+/_=-]{16,}'
            'postgres(ql)?://[^:@/\s]+:[^@/\s]+@'
          )
          # Path exclusions: tooling dirs, documentation, and known dev-only /
          # template credential files (local docker-compose, example/sandbox/test
          # env, and the k8s secret template) that intentionally carry placeholder
          # credentials. Real deploy-time secrets live in actual source/config.
          EXCLUDES=(
            ':!.github' ':!node_modules' ':!.venv'
            ':!docker-compose.yml' ':!**/*.example' ':!.env.example'
            ':!.env.sandbox' ':!.env.test'
            ':!docs/**' ':!**/*.md'
            ':!k8s/secrets.yaml'
            ':!scripts/test-db.sh' ':!scripts/seed-database.ts'
          )
          # A matched line containing any of these markers is a placeholder /
          # redaction / interpolation, not a committed secret.
          PLACEHOLDER='localhost|127\.0\.0\.1|postgres:postgres@|user:password@|REPLACE_WITH|replace-with|CHANGE_ME|change-me|do-not-use|sandbox-secret|example|\*\*\*|\$\{|your-|xxxx|REDACT'
          for pattern in "${patterns[@]}"; do
            matches=$(git grep -nP "$pattern" -- "${EXCLUDES[@]}" 2>/dev/null | grep -vEi "$PLACEHOLDER" || true)
            if [ -n "$matches" ]; then
              echo "::error::Potential secret pattern found: $pattern"
              echo "$matches"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No secret patterns detected"
